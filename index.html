<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PixelMotion</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR (slim) -->
<div id="topbar">
  <label class="button" for="file-input">+ 이미지</label>
  <input id="file-input" type="file" accept="image/*" multiple>
  <button id="btn-save-menu">저장 ▾</button>
  <button id="btn-undo" disabled title="되돌리기 (Ctrl+Z)">↶</button>
  <div class="topbar-divider"></div>
  <label class="topbar-label">격자
    <select id="grid-select">
      <option value="8">8</option>
      <option value="16">16</option>
      <option value="32">32</option>
      <option value="48">48</option>
      <option value="64" selected>64</option>
      <option value="128">128</option>
      <option value="256">256</option>
    </select>
  </label>
  <label class="topbar-label">세분
    <select id="sub-select">
      <option value="1" selected>1×1</option>
      <option value="2">2×2</option>
      <option value="3">3×3</option>
      <option value="4">4×4</option>
    </select>
  </label>
  <label class="checkbox"><input type="checkbox" id="show-grid" checked>격자</label>
  <label class="checkbox"><input type="checkbox" id="show-subgrid" checked>세분 라인</label>
  <button id="btn-shortcuts" title="단축키 (F1)">⌨ 단축키</button>
  <div id="file-info"></div>
</div>

<div class="body-wrap">

  <!-- LEFT VERTICAL TOOL PALETTE -->
  <div id="toolbar-left">
    <button class="tool-btn" data-tool="select" title="선택 — 사각형/올가미 (M/L)"><span class="tk">S</span></button>
    <div class="tool-divider"></div>
    <button class="tool-btn" data-tool="brush" title="브러시 (B)"><span class="tk">B</span></button>
    <button class="tool-btn" data-tool="erase" title="지우개 (E)"><span class="tk">E</span></button>
    <button class="tool-btn" data-tool="pick" title="스포이드 (I)"><span class="tk">I</span></button>
    <div class="tool-divider"></div>
    <button class="tool-btn" id="btn-flip-h" title="좌우 반전">↔</button>
  </div>

  <div id="main">
    <div id="stage">
      <div id="canvas-main">
        <canvas id="canvas"></canvas>
        <div id="badge" class="hidden"></div>
        <div id="toast"></div>
        <div id="empty-state">
          <div class="empty-title">PixelMotion</div>
          <div class="empty-sub">빈 캔버스에 도트를 찍거나 [+ 이미지]</div>
          <div class="empty-hint">여러 장 동시 선택 시 프레임으로 자동 추가</div>
        </div>
        <div id="zoom-ctrl">
          <button id="btn-zoom-out" title="축소 (-)">−</button>
          <span id="zoom-display">FIT</span>
          <button id="btn-zoom-in" title="확대 (+)">+</button>
          <button id="btn-zoom-fit" title="화면에 맞춤 (0)">FIT</button>
          <button id="btn-zoom-100" title="100% (1)">1:1</button>
        </div>
      </div>
      <div id="canvas-ref">
        <canvas id="ref-canvas"></canvas>
        <div id="ref-label">참조 (읽기 전용)</div>
      </div>
    </div>

    <!-- TIMELINE (slim) -->
    <div id="timeline">
      <div id="timeline-controls">
        <div class="tl-mode-group">
          <button id="mode-anim" class="mode-btn active" title="활성 프레임 1장만 표시 / 재생">🎬 애니메이션</button>
          <button id="mode-layer" class="mode-btn" title="표시(👁) ON 모든 프레임을 겹쳐서 보기">🍰 레이어</button>
        </div>
        <div class="topbar-divider"></div>
        <button id="tl-prev" title="이전">◀</button>
        <button id="tl-next" title="다음">▶</button>
        <button id="tl-play" title="재생">▶ 재생</button>
        <button id="tl-stop" title="정지" disabled>⏸</button>
        <label class="topbar-label">FPS <input type="number" id="tl-fps" value="12" min="1" max="60" style="width:42px;"></label>
        <div class="topbar-divider"></div>
        <label class="topbar-label">어니언
          <select id="onion-range">
            <option value="0" selected>끔</option>
            <option value="1">±1</option>
            <option value="3">±3</option>
            <option value="all">모두</option>
          </select>
        </label>
        <label class="checkbox"><input type="checkbox" id="onion-tint">색 틴트</label>
        <div class="topbar-divider"></div>
        <button id="btn-layer-add" title="현재 사이즈로 빈 프레임 추가">+ 빈 프레임</button>
        <button id="tl-add" title="이미지 파일 추가 → 새 프레임">+ 이미지</button>
        <button id="tl-remove" title="현재 프레임 삭제">삭제</button>
        <div class="topbar-divider"></div>
        <button id="btn-layers-all-show" title="모든 프레임 표시">👁 전체</button>
        <button id="btn-layers-all-hide" title="모든 프레임 숨김">🚫 전체</button>
        <div class="topbar-divider"></div>
        <label class="topbar-label">참조
          <select id="ref-frame-header" title="우측에 표시할 프레임 (비어있음 = 단일 뷰)">
            <option value="-1">없음</option>
          </select>
        </label>
        <span id="tl-info" class="modal-info" style="margin-left:auto;">프레임 0개</span>
      </div>
      <div id="timeline-frames"></div>
    </div>

    <div id="status"></div>
  </div>

  <button id="btn-toggle-right" title="우측 패널 접기/펼치기">▶</button>

  <!-- RIGHT ACCORDION PANEL -->
  <div id="rightpanel">

    <!-- 색 / 팔레트 -->
    <details class="panel-section" open id="ps-color">
      <summary>색 / 팔레트 <span id="palette-count" class="badge-count">0</span></summary>
      <div class="row-stack">
        <span class="row-stack-label">활성 색 (클릭 → 픽커)</span>
        <div id="active-color-box" data-rgb="—" title="클릭해서 색 픽커 열기"></div>
        <div id="color-picker">
          <div id="picker-area"><div id="picker-marker" style="left:0%; top:100%;"></div></div>
          <div id="picker-hue"><div id="hue-marker" style="left:0%;"></div></div>
          <div id="picker-hex-row">
            <label>HEX</label>
            <input type="text" id="picker-hex" placeholder="#000000" maxlength="7" spellcheck="false">
          </div>
        </div>
      </div>
      <div class="row-stack">
        <span class="row-stack-label">팔레트</span>
        <div id="palette-grid"></div>
      </div>
      <div class="row">
        <button id="btn-extract-palette" style="width:100%;">팔레트 다시 추출</button>
      </div>
    </details>

    <!-- 도구 속성 (현재 도구별 동적) -->
    <details class="panel-section" open id="ps-tool">
      <summary>도구 속성 <span id="tool-name" class="badge-count">선택 없음</span></summary>
      <div id="tool-props">
        <div class="tool-prop" data-for="brush erase">
          <div class="row-stack">
            <span class="row-stack-label">브러시 크기</span>
            <div class="radio-group">
              <input type="radio" name="brush-size" id="bs-cell" value="cell" checked><label for="bs-cell">큰 격자</label>
              <input type="radio" name="brush-size" id="bs-1" value="1"><label for="bs-1">1×1</label>
            </div>
          </div>
        </div>
        <div class="tool-prop" data-for="brush">
          <div class="row-stack">
            <span class="row-stack-label">셀 변주 <span style="color:#888; font-size:11px;">(큰격자에만)</span></span>
            <div class="radio-group">
              <input type="radio" name="cell-variation" id="cv-off" value="off" checked><label for="cv-off">끔</label>
              <input type="radio" name="cell-variation" id="cv-low" value="low"><label for="cv-low">약</label>
              <input type="radio" name="cell-variation" id="cv-mid" value="mid"><label for="cv-mid">중</label>
              <input type="radio" name="cell-variation" id="cv-high" value="high"><label for="cv-high">강</label>
            </div>
          </div>
        </div>
        <div class="tool-prop" data-for="select">
          <div class="row-stack">
            <span class="row-stack-label">선택 모양</span>
            <div class="radio-group">
              <input type="radio" name="select-mode" id="sm-rect" value="rect" checked><label for="sm-rect">사각형 (M)</label>
              <input type="radio" name="select-mode" id="sm-lasso" value="lasso"><label for="sm-lasso">올가미 (L)</label>
            </div>
          </div>
          <div class="row-stack">
            <span class="row-stack-label">선택 영역 빈 도트 채움</span>
            <div class="radio-group">
              <input type="radio" name="fill-mode" id="fm-avg" value="avg" checked><label for="fm-avg">평균</label>
              <input type="radio" name="fill-mode" id="fm-grad" value="grad"><label for="fm-grad">그라데이션</label>
            </div>
          </div>
          <div class="row">
            <button id="btn-fill-area" class="primary" style="width:100%;">빈 도트 채움</button>
          </div>
          <div class="row">
            <button id="btn-clear-sel" style="width:100%;">선택 해제</button>
          </div>
        </div>
        <div class="tool-prop default-prop">
          <div class="modal-info" style="text-align:center; padding:18px 8px; color:#777;">
            도구를 선택하면 옵션이 표시됩니다.<br>
            <span style="font-size:11px;">(좌측 V/M/L/B/E/I)</span>
          </div>
        </div>
      </div>
    </details>

    <!-- 도트화 -->
    <details class="panel-section" open id="ps-pixelize">
      <summary>도트화</summary>
      <div class="row-stack">
        <span class="row-stack-label">모드</span>
        <div class="radio-group">
          <input type="radio" name="ds" id="ds-avg" value="avg"><label for="ds-avg">평균</label>
          <input type="radio" name="ds" id="ds-dom" value="dom" checked><label for="ds-dom">우세</label>
          <input type="radio" name="ds" id="ds-det" value="det"><label for="ds-det">디테일</label>
        </div>
      </div>
      <div class="row-stack">
        <span class="row-stack-label">색 수</span>
        <div class="radio-group">
          <input type="radio" name="color" id="c0" value="0" checked><label for="c0">원본</label>
          <input type="radio" name="color" id="c8" value="8"><label for="c8">8</label>
          <input type="radio" name="color" id="c16" value="16"><label for="c16">16</label>
          <input type="radio" name="color" id="c32" value="32"><label for="c32">32</label>
          <input type="radio" name="color" id="c64" value="64"><label for="c64">64</label>
        </div>
      </div>
      <div class="row-stack">
        <span class="row-stack-label">채도</span>
        <div class="radio-group">
          <input type="radio" name="sat" id="s100" value="100" checked><label for="s100">기본</label>
          <input type="radio" name="sat" id="s130" value="130"><label for="s130">+30</label>
          <input type="radio" name="sat" id="s160" value="160"><label for="s160">+60</label>
          <input type="radio" name="sat" id="s200" value="200"><label for="s200">+100</label>
        </div>
      </div>
      <div class="row-stack">
        <span class="row-stack-label">아웃라인</span>
        <div class="radio-group">
          <input type="radio" name="outline" id="ol-off" value="off" checked><label for="ol-off">끔</label>
          <input type="radio" name="outline" id="ol-fine" value="fine"><label for="ol-fine">도트</label>
          <input type="radio" name="outline" id="ol-coarse" value="coarse"><label for="ol-coarse">격자</label>
        </div>
      </div>
      <div class="row-stack">
        <span class="row-stack-label">적용 범위</span>
        <div class="radio-group">
          <input type="radio" name="apply-range" id="ar-cur" value="current" checked><label for="ar-cur">현재</label>
          <input type="radio" name="apply-range" id="ar-all" value="all"><label for="ar-all">모든 프레임</label>
        </div>
      </div>
      <div class="row">
        <button id="btn-pixelize" class="primary" style="width:100%;">도트화 실행</button>
      </div>
    </details>

    <!-- 해상도 -->
    <details class="panel-section" open id="ps-res">
      <summary>해상도 <span id="res-current" class="badge-count"></span></summary>
      <div class="row-stack">
        <span class="row-stack-label">정수배 확대 (NEAREST)</span>
        <div class="radio-group">
          <button class="res-btn" data-factor="2">×2</button>
          <button class="res-btn" data-factor="3">×3</button>
          <button class="res-btn" data-factor="4">×4</button>
          <button class="res-btn" data-factor="8">×8</button>
        </div>
      </div>
    </details>

    <!-- 배경 제거 -->
    <details class="panel-section" open id="ps-bg">
      <summary>배경 제거 (rembg)</summary>
      <div class="row" style="gap:6px;">
        <button id="btn-bg" style="flex:1;">배경 제거 실행</button>
        <label class="checkbox"><input type="checkbox" id="bg-precise">정밀</label>
      </div>
    </details>

    <!-- 트레이싱 -->
    <details class="panel-section" id="ps-trace">
      <summary>트레이싱</summary>
      <div class="row">
        <label class="checkbox"><input type="checkbox" id="tracing-mode">트레이싱 모드</label>
      </div>
      <div class="row-stack">
        <span class="row-stack-label">가이드 투명도 <span id="guide-opacity-val" style="color:#4a8;">50%</span></span>
        <input type="range" id="guide-opacity" min="0" max="100" value="50" style="width:100%;">
      </div>
      <div class="row">
        <button id="btn-clear-trace" style="width:100%;">현재 트레이스 지우기</button>
      </div>
    </details>

  </div>

</div>

<div id="tooltip"></div>

<div id="modal-overlay">
  <div id="modal-content">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">제목</span>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
